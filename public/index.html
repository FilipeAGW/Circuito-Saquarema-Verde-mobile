<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1f6f54">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Saquarema Verde">
  <title>Saquarema Verde</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__content">
        <span class="app-kicker">Circuito Saquarema Verde</span>
        <h1>Trilhas e regras ambientais</h1>
        <p>Consulte trilhas, locais naturais e cuidados essenciais antes de visitar.</p>
      </div>
    </header>

    <main class="content" id="conteudo">
      <section class="toolbar" aria-label="Busca e resumo">
        <label class="search-field">
          <span>Buscar</span>
          <input id="searchInput" type="search" placeholder="Nome, local ou regra" autocomplete="off">
        </label>
        <p class="status-line" id="statusLine">Carregando informações...</p>
      </section>

      <nav class="tabbar" aria-label="Categorias">
        <button class="tabbar__button is-active" type="button" data-tab="trilhas">Trilhas</button>
        <button class="tabbar__button" type="button" data-tab="lugares">Lugares</button>
        <button class="tabbar__button" type="button" data-tab="recomendacoes">Regras</button>
      </nav>

      <section class="panel is-active" id="panel-trilhas" aria-labelledby="tab-trilhas">
        <div class="section-heading">
          <h2>Trilhas disponíveis</h2>
          <span id="trailCount">0</span>
        </div>
        <div class="list" id="trilhas"></div>
      </section>

      <section class="panel" id="panel-lugares" aria-labelledby="tab-lugares">
        <div class="section-heading">
          <h2>Lugares naturais</h2>
          <span id="placeCount">0</span>
        </div>
        <div class="list" id="lugares"></div>
      </section>

      <section class="panel" id="panel-recomendacoes" aria-labelledby="tab-recomendacoes">
        <div class="section-heading">
          <h2>Regras ambientais</h2>
          <span id="recommendationCount">0</span>
        </div>
        <div class="list" id="recomendacoes"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Navegação principal">
      <a href="#conteudo">Início</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </div>

  <script src="/app.js"></script>
</body>
</html>
